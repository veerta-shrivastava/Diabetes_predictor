<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Predictor</title>
    
     <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body class="bg-light">
<nav class="navbar">
    <div class="logo">🩺 Diabetes Predictor</div>

    <div class="nav-links">
    </div>
</nav>
<div class="container">
    <div class="card">
        <h2>🩺 AI Diabetes Risk Predictor</h2>
        <form method="POST" action="/predict">
            <div class="form-grid">
    <div >
        <label>Pregnancies</label>
        <input type="number" name="pregnancies" class="form-control" value="{{ form.get('pregnancies', '') if form else '' }}">
    </div>

    <div >
        <label>Glucose</label>
        <input type="number" name="glucose" class="form-control" value="{{ form.get('glucose', '') if form else '' }}">
    </div>

    <div >
        <label>Blood Pressure</label>
        <input type="number" name="bloodpressure" class="form-control" value="{{ form.get('bloodpressure', '') if form else '' }}">
    </div>

    <div >
        <label>Skin Thickness</label>
        <input type="number" name="skinthickness" class="form-control" value="{{ form.get('skinthickness', '') if form else '' }}">
    </div>

    <div >
        <label>Insulin</label>
        <input type="number" name="insulin" class="form-control" value="{{ form.get('insulin', '') if form else '' }}">
    </div>

    <div >
        <label>BMI</label>
        <input type="number" name="bmi" class="form-control" value="{{ form.get('bmi', '') if form else '' }}">
    </div>

    <div >
        <label>Diabetes Pedigree Function</label>
        <input type="number" name="dpf" class="form-control" value="{{ form.get('dpf', '') if form else '' }}">
    </div>

    <div >
        <label>Age</label>
        <input type="number" name="age" class="form-control" value="{{ form.get('age', '') if form else '' }}">
    </div>
</div>
            <div class="button-wrapper">
                <button type="submit" class="btn-primary">Predict</button>
                <button type="reset" class="btn-secondary" onclick="window.location.href='/predict'">Reset</button>
            </div>
        </form>

        {% if prediction_text %}
            <div class="result-card">
                <strong>{{ prediction_text }}</strong>
            </div>
        {% endif %}
    </div>
</div>

<!-- Bootstrap JS CDN (Optional for interactivity) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
